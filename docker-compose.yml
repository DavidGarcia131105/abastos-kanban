version: "3.9"

services:
  db:
    image: postgres:16
    container_name: abastos-postgres
    restart: always
    environment:
      POSTGRES_USER: abastos
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: kanban
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: abastos-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@abastos.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
